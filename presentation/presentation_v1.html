<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 招募配對系統 | 雙模型驗證展示</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1115;
            --bg-panel: #1a1d24;
            --bg-card: #232730;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px 0;
        }

        .sidebar-header {
            padding: 0 24px 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .sidebar-header h1 {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .nav-item {
            padding: 16px 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
        }

        .nav-item.active {
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            border-left: 3px solid var(--accent);
            font-weight: 600;
        }

        .nav-icon {
            font-size: 1.2rem;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            position: relative;
        }

        .content-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 24px;
        }

        .role-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .status-badge {
            background-color: rgba(16, 185, 129, 0.15);
            color: var(--success);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        /* Raw Data Grid */
        .raw-data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .raw-card {
            background-color: rgba(26, 29, 36, 0.5);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }

        .raw-card h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .raw-content {
            flex: 1;
            background-color: #121419;
            border-radius: 8px;
            padding: 16px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #94a3b8;
            white-space: pre-wrap;
            overflow-y: auto;
            height: 180px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .raw-content::-webkit-scrollbar {
            width: 6px;
        }
        .raw-content::-webkit-scrollbar-thumb {
            background-color: #475569;
            border-radius: 4px;
        }

        /* Email Preview Card */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
        }

        .card.preview-card::before { background: linear-gradient(90deg, #3b82f6, #8b5cf6); }
        
        .card-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .preview-text {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e2e8f0;
            font-style: italic;
        }

        /* Comparison Grid */
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .col-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .col-card.generator {
            border-top: 4px solid var(--warning);
        }
        
        .col-card.evaluator {
            border-top: 4px solid var(--success);
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.05);
        }

        .col-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .col-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .badge-gen { background: rgba(245, 158, 11, 0.2); color: var(--warning); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
        .badge-eval { background: rgba(16, 185, 129, 0.2); color: var(--success); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }

        .reasons-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .reason-item {
            position: relative;
            padding-left: 20px;
            line-height: 1.5;
            color: #cbd5e1;
            font-size: 0.95rem;
        }

        .reason-item::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--text-muted);
        }

        .generator .reason-item { color: #94a3b8; }
        .evaluator .reason-item { color: #f8fafc; }

        /* Evaluator Comments */
        .comments-card {
            background: linear-gradient(145deg, #1e222a, #232730);
            border: 1px solid #475569;
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            margin-bottom: 40px;
        }
        
        .comments-card::after {
            content: '🛡️';
            position: absolute;
            right: 20px;
            bottom: -10px;
            font-size: 5rem;
            opacity: 0.05;
        }

        .comments-card .card-label {
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .comments-text {
            font-size: 0.95rem;
            line-height: 1.7;
            color: #cbd5e1;
        }

        /* Highlight differences */
        .highlight-del {
            color: #fca5a5;
            text-decoration: line-through;
            background: rgba(239, 68, 68, 0.15);
            padding: 2px 4px;
            border-radius: 4px;
        }

        .highlight-add {
            color: #6ee7b7;
            background: rgba(16, 185, 129, 0.15);
            padding: 2px 4px;
            border-radius: 4px;
        }
    </style>

                title: "全端工程師配對",

                resumeText: `林志明 (Zhi-Ming Lin)\n聯絡電話：0911-111-111\n電子郵件：zhiming.lin@example.com\n\n【專業技能】\n- 語言與框架：JavaScript/TypeScript, React.js, Vue.js, Node.js, Python (Django/FastAPI)\n- 資料庫與基礎設施：PostgreSQL, MongoDB, Redis, Docker, AWS (EC2, S3, RDS)\n- 工具：Git, CI/CD (GitHub Actions), JIRA\n\n【工作經歷】\n- 2020.08 - 至今 | 全端工程師 @ 雲端軟體科技\n  - 負責開發與維護 SaaS 平台的企業級管理後台，前端使用 React，後端使用 Node.js。\n  - 導入 Redis 快取機制，將高流量的報表頁面載入速度提升 50%。\n  - 透過 Docker 容器化所有微服務，並建置自動化 CI/CD 流程，縮短部署時間。\n- 2018.07 - 2020.07 | 前端工程師 @ 數位行銷公司\n  - 使用 Vue.js 開發多個行銷活動網站，支援高併發流量。\n\n【自我介紹】\n擁有超過五年的網站開發經驗，熟悉從前端到後端的完整開發流程。對於系統架構設計與效能優化有強烈熱忱，善於與設計師及產品經理溝通合作，期望能打造出高效且具備優良使用者體驗的產品。`,
                jobText: `資深全端工程師 (Senior Full-Stack Engineer)\n\n【職位描述】\n我們正在尋找一位熱血的資深全端工程師加入我們的核心產品團隊。您將負責打造具備高延展性與高效能的 Web 應用程式。我們重視程式碼品質與現代化的開發流程。\n\n【主要職責】\n- 參與產品系統架構規劃與技術選型。\n- 負責前端 (React.js) 與後端 (Node.js/Python) 的功能開發與 API 串接。\n- 實作與維護資料庫結構 (PostgreSQL / Redis)。\n- 部署與監控 AWS 雲端基礎架構，優化 CI/CD 流程。\n- 指導初階工程師，進行 Code Review 確保程式碼品質。\n\n【職位要求】\n- 資訊相關科系畢業，或具備同等實務經驗。\n- 至少 3 年以上 Web 應用程式全端開發經驗。\n- 熟悉 React.js 或 Vue.js，具備深厚的 JavaScript/TypeScript 基礎。\n- 熟悉 Node.js 或 Python (Django/FastAPI) 等後端技術。\n- 熟悉關聯式資料庫設計與效能優化。\n- 具備 AWS (EC2, S3, RDS) 等雲端平台操作經驗者尤佳。\n- 具備良好的團隊合作精神與溝通能力。`,

            uiux: {

        function loadData(role, element) {
            // Update active state

            element.classList.add('active');

            const container = document.getElementById('content-container');
            container.style.animation = 'none';
            container.offsetHeight; // Trigger reflow
            container.style.animation = 'fadeIn 0.5s ease';
            
            // Render content

        }
